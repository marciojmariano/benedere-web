<div>
  <p-toast />
  <p-confirmDialog />

  <app-page-header title="Produtos" subtitle="Catálogo de produtos de série">
    <p-button label="Novo Produto" icon="pi pi-plus" (onClick)="novo()" />
  </app-page-header>

  <!-- KPI Summary -->
  <div class="grid grid-cols-3 gap-3 mb-5">
    <div class="bg-white rounded-xl border border-zinc-100 p-4 flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg bg-zinc-100 flex items-center justify-center shrink-0">
        <i class="pi pi-shopping-bag text-zinc-500 text-sm"></i>
      </div>
      <div>
        <p class="text-[10px] font-semibold text-zinc-400 uppercase tracking-wide">Total</p>
        <p class="text-xl font-bold text-zinc-800 leading-none mt-0.5">{{ produtos.length }}</p>
      </div>
    </div>
    <div class="bg-white rounded-xl border border-zinc-100 p-4 flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg bg-emerald-50 flex items-center justify-center shrink-0">
        <i class="pi pi-check-circle text-emerald-500 text-sm"></i>
      </div>
      <div>
        <p class="text-[10px] font-semibold text-emerald-500 uppercase tracking-wide">Ativos</p>
        <p class="text-xl font-bold text-zinc-800 leading-none mt-0.5">{{ totalAtivos }}</p>
      </div>
    </div>
    <div class="bg-white rounded-xl border border-zinc-100 p-4 flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg bg-rose-50 flex items-center justify-center shrink-0">
        <i class="pi pi-times-circle text-rose-400 text-sm"></i>
      </div>
      <div>
        <p class="text-[10px] font-semibold text-rose-400 uppercase tracking-wide">Inativos</p>
        <p class="text-xl font-bold text-zinc-800 leading-none mt-0.5">{{ totalInativos }}</p>
      </div>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-zinc-100">
    <p-table #dt [value]="produtos" [loading]="loading" [paginator]="true" [rows]="10"
             [globalFilterFields]="['nome']" styleClass="p-datatable-sm">
      <ng-template pTemplate="caption">
        <div class="flex justify-between items-center">
          <span class="text-sm text-zinc-400">
            {{ produtos.length }} produto{{ produtos.length !== 1 ? 's' : '' }}
          </span>
          <div class="relative">
            <i class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400 text-sm"></i>
            <input pInputText type="text" placeholder="Buscar produto..." class="w-64 pl-9"
                   (input)="dt.filterGlobal($any($event.target).value, 'contains')" />
          </div>
        </div>
      </ng-template>
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="nome">Nome <p-sortIcon field="nome" /></th>
          <th pSortableColumn="peso_total_g">Peso <p-sortIcon field="peso_total_g" /></th>
          <th>Status</th>
          <th style="width: 120px">Ações</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-p>
        <tr class="group">
          <td class="font-medium text-zinc-800">{{ p.nome }}</td>
          <td class="text-zinc-600 tabular-nums">{{ p.peso_total_g }}g</td>
          <td><app-status-badge [status]="p.ativo ? 'ativo' : 'inativo'" /></td>
          <td>
            <div class="flex gap-1">
              <button
                class="p-1.5 rounded-lg text-zinc-400 hover:text-emerald-600 hover:bg-emerald-50 transition-colors"
                (click)="editar(p)"
                title="Editar"
              >
                <i class="pi pi-pencil"></i>
              </button>
              <button
                class="p-1.5 rounded-lg text-zinc-400 hover:text-rose-600 hover:bg-rose-50 transition-colors"
                (click)="confirmarDesativar(p)"
                title="Desativar"
              >
                <i class="pi pi-trash"></i>
              </button>
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="4" class="text-center py-12">
            <div>
              <i class="pi pi-box text-4xl text-zinc-300 mb-3 block"></i>
              <p class="text-zinc-400 font-medium">Nenhum produto encontrado</p>
              <p class="text-zinc-300 text-sm mt-1">Crie seu primeiro produto clicando em "Novo Produto"</p>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
