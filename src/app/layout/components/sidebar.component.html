<aside
  class="flex flex-col h-screen shadow-lg bg-zinc-900 sidebar-transition"
  [class.w-60]="!collapsed()"
  [class.w-16]="collapsed()"
>

  <!-- Logo -->
    <div class="flex items-center gap-3 px-4 py-4 border-b border-zinc-800">
      <div class="flex-none flex items-center justify-center bg-emerald-500 rounded-lg"
          style="width: 32px; height: 32px; min-width: 32px; min-height: 32px;">
        <app-icon name="leaf" [size]="16" class="text-white"></app-icon>
      </div>

      @if (sidebarOpen()) {
    <div class="leading-none"> <p class="text-white font-bold text-sm m-0 leading-[1.1]">Benedere</p>
      <p class="text-zinc-500 text-xs m-0 leading-[1.1]">Alimentação Saudável</p>
    </div>
}
    </div>

  <!-- Menu -->
  <nav class="flex-1 px-2 py-2 overflow-y-auto custom-scrollbar">
    @for (group of menuGroups; track group.label) {
      @if (group.label && !collapsed()) {
        <p class="px-3 pt-3 pb-1 text-[10px] font-bold text-zinc-500 uppercase tracking-widest">
          {{ group.label }}
        </p>
      }
      @if (group.label && collapsed()) {
        <div class="border-t border-zinc-700/50 my-2"></div>
      }
      @for (item of group.items; track item.route) {
        <div
          [routerLink]="item.route"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="item.route === '/' ? { exact: true } : { exact: false }"
          class="flex items-center gap-3 px-3 py-1 rounded-lg mb-1 text-zinc-400 hover:text-white hover:bg-zinc-700/60 transition-all duration-200 cursor-pointer"
          [class.justify-center]="collapsed()"
          [attr.title]="collapsed() ? item.label : null"
        >
          <i [class]="item.icon + ' text-lg shrink-0'"></i>
          @if (!collapsed()) {
            <span class="text-sm font-medium whitespace-nowrap">{{ item.label }}</span>
          }
        </div>
      }
    }
  </nav>

  <!-- Toggle button -->
  <div class="px-2 py-3 border-t border-zinc-700">
    <button
      (click)="toggleCollapse()"
      class="flex items-center justify-center w-full py-2 rounded-lg text-zinc-400 hover:text-white hover:bg-zinc-700/60 transition-all duration-200"
    >
      <i [class]="collapsed() ? 'pi pi-angle-right' : 'pi pi-angle-left'" class="text-lg"></i>
    </button>
  </div>

</aside>
