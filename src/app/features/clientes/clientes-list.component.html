<div>
  <p-toast />
  <p-confirmDialog />

  <app-page-header title="Clientes" subtitle="Gerencie os clientes cadastrados">
    <p-button label="Novo Cliente" icon="pi pi-plus" (onClick)="novo()" />
  </app-page-header>

  <div class="bg-white rounded-2xl shadow-sm border border-zinc-100">
    <p-table #dt [value]="clientes" [loading]="loading" [paginator]="true" [rows]="10"
             [rowsPerPageOptions]="[10, 25, 50]"
             [globalFilterFields]="['nome', 'email', 'telefone']"
             styleClass="p-datatable-sm">
      <ng-template pTemplate="caption">
        <div class="flex justify-between items-center">
          <span class="text-sm text-zinc-400">{{ clientes.length }} cliente(s)</span>
          <div class="relative">
            <i class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400 text-sm"></i>
            <input pInputText type="text" placeholder="Buscar por nome, email ou telefone..."
                   class="w-72 pl-9"
                   (input)="dt.filterGlobal($any($event.target).value, 'contains')" />
          </div>
        </div>
      </ng-template>
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="nome">Nome <p-sortIcon field="nome" /></th>
          <th>Email</th>
          <th>Telefone</th>
          <th>Status</th>
          <th style="width: 100px">Ações</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-cliente>
        <tr class="group cursor-pointer hover:bg-zinc-50/50 transition-colors" (click)="abrirDetalhe(cliente)">
          <td>
            <div class="flex items-center gap-3">
              <app-avatar [name]="cliente.nome" size="sm" />
              <span class="font-medium text-zinc-800">{{ cliente.nome }}</span>
            </div>
          </td>
          <td class="text-zinc-600">{{ cliente.email || '—' }}</td>
          <td class="text-zinc-600">{{ cliente.telefone || '—' }}</td>
          <td><app-status-badge [status]="cliente.ativo ? 'ativo' : 'inativo'" /></td>
          <td>
            <div class="flex gap-1" (click)="$event.stopPropagation()">
              <button class="p-1.5 rounded-lg text-zinc-400 hover:text-emerald-600 hover:bg-emerald-50 transition-colors"
                      (click)="editar(cliente)" title="Editar">
                <i class="pi pi-pencil"></i>
              </button>
              <button class="p-1.5 rounded-lg text-zinc-400 hover:text-rose-600 hover:bg-rose-50 transition-colors"
                      (click)="confirmarDesativar(cliente)" title="Desativar">
                <i class="pi pi-trash"></i>
              </button>
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center py-12">
            <i class="pi pi-users text-4xl text-zinc-300 mb-3"></i>
            <p class="text-zinc-400 font-medium">Nenhum cliente encontrado</p>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  <!-- Drawer de detalhes -->
  <app-cliente-detail-drawer
    [visible]="drawerVisible()"
    [cliente]="clienteSelecionado()"
    (visibleChange)="drawerVisible.set($event)"
    (editar)="editar($event); drawerVisible.set(false)"
  />
</div>
