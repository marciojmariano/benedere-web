<div>
  <p-toast />
  <p-confirmDialog />

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h2 class="text-2xl font-bold text-gray-800">Clientes</h2>
      <p class="text-gray-500 text-sm mt-1">Gerencie os clientes cadastrados</p>
    </div>
    <p-button
      label="Novo Cliente"
      icon="pi pi-plus"
      (onClick)="novo()"
    />
  </div>

  <!-- Tabela -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100">
    <p-table
      [value]="clientes"
      [loading]="loading"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[10, 25, 50]"
      styleClass="p-datatable-sm"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Nome</th>
          <th>Email</th>
          <th>Telefone</th>
          <th>Status</th>
          <th style="width: 120px">Ações</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-cliente>
        <tr>
          <td class="font-medium">{{ cliente.nome }}</td>
          <td>{{ cliente.email || '—' }}</td>
          <td>{{ cliente.telefone || '—' }}</td>
          <td>
            <p-tag
              [value]="cliente.ativo ? 'Ativo' : 'Inativo'"
              [severity]="cliente.ativo ? 'success' : 'danger'"
            />
          </td>
          <td>
            <div class="flex gap-2">
              <p-button
                icon="pi pi-pencil"
                [text]="true"
                [rounded]="true"
                size="small"
                (onClick)="editar(cliente)"
              />
              <p-button
                icon="pi pi-trash"
                [text]="true"
                [rounded]="true"
                size="small"
                severity="danger"
                (onClick)="confirmarDesativar(cliente)"
              />
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center text-gray-400 py-8">
            Nenhum cliente encontrado
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
