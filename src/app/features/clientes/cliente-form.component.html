<div class="max-w-2xl">
  <p-toast />

  <!-- Header -->
  <div class="flex items-center gap-3 mb-6">
    <p-button
      icon="pi pi-arrow-left"
      [text]="true"
      [rounded]="true"
      (onClick)="voltar()"
    />
    <div>
      <h2 class="text-2xl font-bold text-gray-800">
        {{ clienteId ? 'Editar Cliente' : 'Novo Cliente' }}
      </h2>
      <p class="text-gray-500 text-sm mt-1">Preencha os dados do cliente</p>
    </div>
  </div>

  <!-- Formulário -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
    <form [formGroup]="form" (ngSubmit)="salvar()">

      <!-- Nome -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Nome <span class="text-red-500">*</span>
        </label>
        <input
          pInputText
          formControlName="nome"
          placeholder="Nome completo"
          class="w-full"
          [class.ng-invalid]="isInvalid('nome')"
        />
        @if (isInvalid('nome')) {
          <small class="text-red-500">Nome é obrigatório</small>
        }
      </div>

      <!-- Email -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          pInputText
          formControlName="email"
          placeholder="email@exemplo.com"
          class="w-full"
          [class.ng-invalid]="isInvalid('email')"
        />
        @if (isInvalid('email')) {
          <small class="text-red-500">Email inválido</small>
        }
      </div>

      <!-- Telefone -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Telefone</label>
        <input
          pInputText
          formControlName="telefone"
          placeholder="(11) 99999-9999"
          class="w-full"
        />
      </div>

      <!-- Endereço -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Endereço</label>
        <input
          pInputText
          formControlName="endereco"
          placeholder="Rua, número, bairro, cidade"
          class="w-full"
        />
      </div>

      <!-- Nutricionista -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Nutricionista</label>
        <p-select
          formControlName="nutricionista_id"
          [options]="nutricionistas"
          optionLabel="nome"
          optionValue="id"
          placeholder="Selecione um nutricionista (opcional)"
          [showClear]="true"
          styleClass="w-full"
        />
      </div>

      <!-- Observações -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Observações</label>
        <input
          pInputText
          formControlName="observacoes"
          placeholder="Observações adicionais"
          class="w-full"
        />
      </div>
      <!-- Markup Padrão -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Markup Padrão (opcional)</label>
        <p-select
          formControlName="markup_id_padrao"
          [options]="markups"
          optionLabel="nome"
          optionValue="id"
          placeholder="Selecione um markup padrão"
          [showClear]="true"
          styleClass="w-full"
        />
      </div>

      <!-- Botões -->
      <div class="flex gap-3 justify-end">
        <p-button
          label="Cancelar"
          [text]="true"
          severity="secondary"
          (onClick)="voltar()"
        />
        <p-button
          label="Salvar"
          icon="pi pi-check"
          type="submit"
          [loading]="salvando"
        />
      </div>

    </form>
  </div>
</div>
