<div>
  <p-toast />
  <p-confirmDialog />

  <app-page-header title="Produtos" subtitle="Catálogo de produtos de série">
    <p-button label="Novo Produto" icon="pi pi-plus" (onClick)="novo()" />
  </app-page-header>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
    <app-kpi-card 
      label="Total de Produtos" 
      [value]="produtos.length" 
      icon="shoppingBag"
      color="sky">
      <app-icon name="shoppingBag" [size]="22" class="text-zinc-500"></app-icon>
    </app-kpi-card>

    <app-kpi-card 
      label="Produtos Ativos" 
      [value]="totalAtivos" 
      icon="check"
      color="emerald">
      <app-icon name="check" [size]="22" class="text-emerald-500"></app-icon>
    </app-kpi-card>

    <app-kpi-card 
      label="Produtos Inativos" 
      [value]="totalInativos" 
      icon="x"
      color="rose">
      <app-icon name="x" [size]="22" class="text-rose-400"></app-icon>
    </app-kpi-card>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-zinc-100 overflow-hidden">
    <p-table #dt [value]="produtos" [loading]="loading" [paginator]="true" [rows]="10"
             [globalFilterFields]="['nome']" styleClass="p-datatable-sm">
      
      <ng-template pTemplate="caption">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 p-2">
          <span class="text-sm text-zinc-400 font-medium">
            {{ produtos.length }} produto{{ produtos.length !== 1 ? 's' : '' }} no catálogo
          </span>
          <div class="relative w-full md:w-64">
            <app-icon name="search" [size]="16" class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400"></app-icon>
            <input pInputText type="text" placeholder="Buscar produto..." 
                   class="w-full pl-10 py-2 border-zinc-200 rounded-xl text-sm focus:ring-emerald-500"
                   (input)="dt.filterGlobal($any($event.target).value, 'contains')" />
          </div>
        </div>
      </ng-template>

      <ng-template pTemplate="header">
        <tr class="bg-zinc-50/50">
          <th pSortableColumn="nome" class="py-4 px-5 text-zinc-600 font-semibold">Nome <p-sortIcon field="nome" /></th>
          <th pSortableColumn="peso_total_g" class="py-4 px-5 text-zinc-600 font-semibold">Peso <p-sortIcon field="peso_total_g" /></th>
          <th class="py-4 px-5 text-zinc-600 font-semibold">Status</th>
          <th style="width: 120px" class="py-4 px-5 text-zinc-600 font-semibold text-center">Ações</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-p>
        <tr class="group hover:bg-zinc-50/30 transition-colors">
          <td class="py-4 px-5 font-medium text-zinc-800">{{ p.nome }}</td>
          <td class="py-4 px-5 text-zinc-600 tabular-nums">{{ p.peso_total_g }}g</td>
          <td class="py-4 px-5">
            <app-status-badge [status]="p.ativo ? 'Ativo' : 'Inativo'"></app-status-badge>
          </td>
          <td class="py-4 px-5 text-center">
            <div class="flex justify-center gap-2">
              <button (click)="editar(p)" title="Editar"
                class="p-2 rounded-lg text-zinc-400 hover:text-emerald-600 hover:bg-emerald-50 transition-all">
                <app-icon name="edit" [size]="18"></app-icon>
              </button>
              <button (click)="confirmarDesativar(p)" title="Desativar"
                class="p-2 rounded-lg text-zinc-400 hover:text-rose-600 hover:bg-rose-50 transition-all">
                <app-icon name="trash" [size]="18"></app-icon>
              </button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="4" class="text-center py-20 bg-zinc-50/20">
            <div class="flex flex-col items-center">
              <app-icon name="grid" [size]="48" class="text-zinc-200 mb-4"></app-icon>
              <p class="text-zinc-500 font-semibold">Nenhum produto encontrado</p>
              <p class="text-zinc-400 text-sm mt-1">Sua lista está vazia ou o filtro não retornou resultados.</p>
            </div>
          </td>
        </tr>
      </ng-template>

    </p-table>
  </div>
</div>
