<div>
  <p-toast />

  <app-page-header
    [title]="isEdicao ? 'Editar Produto' : 'Novo Produto'"
    [subtitle]="isEdicao ? 'Altere os dados do produto e sua receita' : 'Cadastre um novo produto no catálogo'"
  >
    <p-button label="Voltar" icon="pi pi-arrow-left" [outlined]="true" severity="secondary" (onClick)="voltar()" />
  </app-page-header>

  <form [formGroup]="form" (ngSubmit)="salvar()">
    <div class="bg-white rounded-2xl shadow-sm border border-zinc-100 overflow-hidden">

      <!-- Tabs -->
      <div class="border-b border-zinc-100">
        <div class="flex">
          <button type="button"
            class="px-6 py-3 text-sm font-semibold transition-colors border-b-2"
            [class]="activeTab === 0
              ? 'text-emerald-600 border-emerald-500'
              : 'text-zinc-400 border-transparent hover:text-zinc-600'"
            (click)="activeTab = 0"
          >
            <i class="pi pi-info-circle mr-2"></i>Informações
          </button>
          <button type="button"
            class="px-6 py-3 text-sm font-semibold transition-colors border-b-2"
            [class]="activeTab === 1
              ? 'text-emerald-600 border-emerald-500'
              : 'text-zinc-400 border-transparent hover:text-zinc-600'"
            (click)="activeTab = 1"
          >
            <i class="pi pi-box mr-2"></i>Composição
            @if (composicaoAtual.length > 0) {
              <span class="ml-2 px-1.5 py-0.5 rounded-full text-[10px] bg-emerald-100 text-emerald-700">
                {{ composicaoAtual.length }}
              </span>
            }
          </button>
        </div>
      </div>

      <!-- Tab: Informações -->
      @if (activeTab === 0) {
        <div class="p-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="flex flex-col gap-1.5">
              <label class="text-xs font-semibold text-zinc-400 uppercase tracking-wide">Nome *</label>
              <input pInputText formControlName="nome" placeholder="Ex: Escondidinho de Ragu" />
              @if (isInvalid('nome')) {
                <small class="text-rose-500 text-xs">Nome é obrigatório (mín. 2 caracteres)</small>
              }
            </div>

            <div class="flex flex-col gap-1.5">
              <label class="text-xs font-semibold text-zinc-400 uppercase tracking-wide">Tipo de Refeição</label>
              <p-select formControlName="tipo_refeicao" [options]="tiposRefeicao"
                        optionLabel="label" optionValue="value" placeholder="Selecione..." [showClear]="true" />
            </div>

            <div class="md:col-span-2 flex flex-col gap-1.5">
              <label class="text-xs font-semibold text-zinc-400 uppercase tracking-wide">Descrição</label>
              <textarea pTextarea formControlName="descricao" rows="3" placeholder="Descrição opcional do produto"></textarea>
            </div>
          </div>
        </div>
      }

      <!-- Tab: Composição (drag-drop component) -->
      @if (activeTab === 1) {
        <div class="p-6">
          @if (ingredientes.length > 0) {
            <app-produto-composicao
              [ingredientes]="ingredientes"
              [initialItems]="composicaoInicial"
              (composicaoChange)="onComposicaoChange($event)"
            />
          } @else {
            <div class="text-center py-8 text-zinc-400">
              <i class="pi pi-spin pi-spinner text-2xl mb-2"></i>
              <p>Carregando ingredientes...</p>
            </div>
          }
        </div>
      }
    </div>

    <!-- Botões -->
    <div class="flex justify-end gap-3 mt-6">
      <p-button label="Cancelar" [outlined]="true" severity="secondary" (onClick)="voltar()" />
      <p-button label="Salvar" icon="pi pi-check" type="submit" [loading]="salvando" />
    </div>
  </form>
</div>
