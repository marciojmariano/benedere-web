<div class="max-w-2xl">
  <p-toast />
  <div class="flex items-center gap-3 mb-6">
    <p-button icon="pi pi-arrow-left" [text]="true" [rounded]="true" (onClick)="voltar()" />
    <div>
      <h2 class="text-2xl font-bold text-gray-800">{{ nutricionistaId ? 'Editar Nutricionista' : 'Novo Nutricionista' }}</h2>
      <p class="text-gray-500 text-sm mt-1">Preencha os dados do nutricionista</p>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
    <form [formGroup]="form" (ngSubmit)="salvar()">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Nome <span class="text-red-500">*</span></label>
        <input pInputText formControlName="nome" placeholder="Nome completo" class="w-full" [class.ng-invalid]="isInvalid('nome')" />
        @if (isInvalid('nome')) { <small class="text-red-500">Nome é obrigatório</small> }
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">CRN <span class="text-red-500">*</span></label>
        <input pInputText formControlName="crn" placeholder="CRN-0 00000" class="w-full" [class.ng-invalid]="isInvalid('crn')" />
        @if (isInvalid('crn')) { <small class="text-red-500">CRN é obrigatório</small> }
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input pInputText formControlName="email" placeholder="email@exemplo.com" class="w-full" />
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Telefone</label>
        <input pInputText formControlName="telefone" placeholder="(11) 99999-9999" class="w-full" />
      </div>
      <div class="flex gap-3 justify-end">
        <p-button label="Cancelar" [text]="true" severity="secondary" (onClick)="voltar()" />
        <p-button label="Salvar" icon="pi pi-check" type="submit" [loading]="salvando" />
      </div>
    </form>
  </div>
</div>
