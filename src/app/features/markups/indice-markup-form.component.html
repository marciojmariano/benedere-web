<div class="max-w-2xl">
  <p-toast />
  <div class="flex items-center gap-3 mb-6">
    <p-button icon="pi pi-arrow-left" [text]="true" [rounded]="true" (onClick)="voltar()" />
    <div>
      <h2 class="text-2xl font-bold text-gray-800">{{ indiceId ? 'Editar Índice' : 'Novo Índice de Markup' }}</h2>
      <p class="text-gray-500 text-sm mt-1">Preencha os dados do índice</p>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
    <form [formGroup]="form" (ngSubmit)="salvar()">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Nome <span class="text-red-500">*</span></label>
        <input pInputText formControlName="nome" placeholder="Ex: Impostos, Lucro, Despesas" class="w-full" [class.ng-invalid]="isInvalid('nome')" />
        @if (isInvalid('nome')) { <small class="text-red-500">Nome é obrigatório</small> }
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Percentual (%) <span class="text-red-500">*</span></label>
        <input pInputText formControlName="percentual" type="number" step="0.01" placeholder="Ex: 15.00" class="w-full" [class.ng-invalid]="isInvalid('percentual')" />
        @if (isInvalid('percentual')) { <small class="text-red-500">Percentual deve ser entre 0.01 e 99.99</small> }
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
        <input pInputText formControlName="descricao" placeholder="Descrição opcional" class="w-full" />
      </div>
      <div class="flex gap-3 justify-end">
        <p-button label="Cancelar" [text]="true" severity="secondary" (onClick)="voltar()" />
        <p-button label="Salvar" icon="pi pi-check" type="submit" [loading]="salvando" />
      </div>
    </form>
  </div>
</div>
