<div class="max-w-2xl">
  <p-toast />
  <div class="flex items-center gap-3 mb-6">
    <p-button icon="pi pi-arrow-left" [text]="true" [rounded]="true" (onClick)="voltar()" />
    <div>
      <h2 class="text-2xl font-bold text-gray-800">{{ markupId ? 'Editar Markup' : 'Novo Markup' }}</h2>
      <p class="text-gray-500 text-sm mt-1">Preencha os dados do markup</p>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
    <form [formGroup]="form" (ngSubmit)="salvar()">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Nome <span class="text-red-500">*</span></label>
        <input pInputText formControlName="nome" placeholder="Nome do markup" class="w-full" [class.ng-invalid]="isInvalid('nome')" />
        @if (isInvalid('nome')) { <small class="text-red-500">Nome é obrigatório</small> }
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
        <input pInputText formControlName="descricao" placeholder="Descrição opcional" class="w-full" />
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Índices <span class="text-red-500">*</span></label>
        <p-multiselect
          formControlName="indices_ids"
          [options]="indices"
          optionLabel="nome"
          optionValue="id"
          placeholder="Selecione os índices"
          styleClass="w-full"
          [showClear]="true"
        />
        @if (isInvalid('indices_ids')) { <small class="text-red-500">Selecione pelo menos um índice</small> }
      </div>
      <div class="flex gap-3 justify-end">
        <p-button label="Cancelar" [text]="true" severity="secondary" (onClick)="voltar()" />
        <p-button label="Salvar" icon="pi pi-check" type="submit" [loading]="salvando" />
      </div>
    </form>
  </div>
</div>
