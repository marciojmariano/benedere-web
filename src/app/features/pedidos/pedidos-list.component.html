<div>
  <p-toast />

  <div class="flex items-center justify-between mb-6">
    <div>
      <h2 class="text-2xl font-bold text-gray-800">Pedidos</h2>
      <p class="text-gray-500 text-sm mt-1">Gerencie os pedidos</p>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100">
    <p-table [value]="pedidos" [loading]="loading" [paginator]="true" [rows]="10" styleClass="p-datatable-sm">
      <ng-template pTemplate="header">
        <tr>
          <th>Número</th>
          <th>Status</th>
          <th>Valor Total</th>
          <th>Entrega Prevista</th>
          <th style="width: 100px">Ações</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-p>
        <tr class="cursor-pointer" (click)="ver(p)">
          <td class="font-medium">{{ p.numero }}</td>
          <td><p-tag [value]="p.status" [severity]="statusSeverity(p.status)" /></td>
          <td>R$ {{ p.valor_total }}</td>
          <td>{{ p.data_entrega_prevista ? (p.data_entrega_prevista | date:'dd/MM/yyyy') : 'A definir' }}</td>
          <td>
            <p-button icon="pi pi-file-pdf" [text]="true" [rounded]="true" size="small" severity="danger" (onClick)="baixarPdf(p, $event)" />
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="5" class="text-center text-gray-400 py-8">Nenhum pedido encontrado</td></tr>
      </ng-template>
    </p-table>
  </div>
</div>
