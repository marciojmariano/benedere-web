<div>
  <p-toast />

  <div class="flex items-center justify-between mb-6">
    <div>
      <h2 class="text-2xl font-bold text-gray-800">Orçamentos</h2>
      <p class="text-gray-500 text-sm mt-1">Gerencie os orçamentos</p>
    </div>
    <p-button label="Novo Orçamento" icon="pi pi-plus" (onClick)="novo()" />
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100">
    <p-table
      [value]="orcamentos"
      [loading]="loading"
      [paginator]="true"
      [rows]="10"
      styleClass="p-datatable-sm"
      selectionMode="single"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Número</th>
          <th>Cliente</th>
          <th>Status</th>
          <th>Preço Final</th>
          <th>Validade</th>
          <th style="width: 100px">Ações</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-o>
        <tr class="cursor-pointer" (click)="ver(o)">
          <td class="font-medium">{{ o.numero }}</td>
          <td>{{ nomeCliente(o.cliente_id) }}</td>
          <p-tag [value]="statusLabel(o.status)" [severity]="statusSeverity(o.status)" />
          <td>R$ {{ o.preco_final }}</td>
          <td>{{ o.validade_dias }} dias</td>
          <td>
            <p-button icon="pi pi-file-pdf" [text]="true" [rounded]="true" size="small" severity="danger" (onClick)="baixarPdf(o, $event)" />
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="6" class="text-center text-gray-400 py-8">Nenhum orçamento encontrado</td></tr>
      </ng-template>
    </p-table>
  </div>
</div>
