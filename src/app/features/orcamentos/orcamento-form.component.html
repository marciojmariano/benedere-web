<div class="max-w-4xl">
  <p-toast />
  <div class="flex items-center gap-3 mb-6">
    <p-button icon="pi pi-arrow-left" [text]="true" [rounded]="true" (onClick)="voltar()" />
    <div>
      <h2 class="text-2xl font-bold text-gray-800">Novo Orçamento</h2>
      <p class="text-gray-500 text-sm mt-1">Preencha os dados do orçamento</p>
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="salvar()">

    <!-- Dados gerais -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-4">
      <h3 class="font-semibold text-gray-700 mb-4">Dados Gerais</h3>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Cliente <span class="text-red-500">*</span></label>
          <p-select formControlName="cliente_id" [options]="clientes" optionLabel="nome" optionValue="id" placeholder="Selecione o cliente" styleClass="w-full" />
          @if (isInvalid('cliente_id')) { <small class="text-red-500">Cliente é obrigatório</small> }
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Markup (opcional)</label>
          <p-select formControlName="markup_id" [options]="markups" optionLabel="nome" optionValue="id" placeholder="Sem markup no total" [showClear]="true" styleClass="w-full" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Custo Embalagem (R$)</label>
          <input pInputText formControlName="custo_embalagem" type="number" step="0.01" class="w-full" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Taxa de Entrega (R$)</label>
          <input pInputText formControlName="taxa_entrega" type="number" step="0.01" class="w-full" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Validade (dias)</label>
          <input pInputText formControlName="validade_dias" type="number" class="w-full" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Observações</label>
          <input pInputText formControlName="observacoes" placeholder="Opcional" class="w-full" />
        </div>
      </div>
    </div>

    <!-- Itens -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-4">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-semibold text-gray-700">Ingredientes</h3>
        <p-button label="Adicionar" icon="pi pi-plus" size="small" [text]="true" (onClick)="adicionarItem()" />
      </div>

      <div formArrayName="itens">
        @for (item of itens.controls; track $index) {
          <div [formGroupName]="$index" class="grid grid-cols-4 gap-3 mb-3 p-3 bg-gray-50 rounded-lg">
            <div class="col-span-2">
              <label class="block text-xs font-medium text-gray-600 mb-1">Ingrediente</label>
              <p-select formControlName="ingrediente_id" [options]="ingredientes" optionLabel="nome" optionValue="id" placeholder="Selecione" styleClass="w-full" />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">Quantidade</label>
              <input pInputText formControlName="quantidade" type="number" step="0.001" class="w-full" />
            </div>
            <div class="flex gap-2 items-end">
              <div class="flex-1">
                <label class="block text-xs font-medium text-gray-600 mb-1">Unidade</label>
                <p-select formControlName="unidade_medida" [options]="unidades" optionLabel="label" optionValue="value" styleClass="w-full" />
              </div>
              @if (itens.length > 1) {
                <p-button icon="pi pi-trash" [text]="true" [rounded]="true" severity="danger" size="small" (onClick)="removerItem($index)" />
              }
            </div>
          </div>
        }
      </div>
    </div>

    <div class="flex gap-3 justify-end">
      <p-button label="Cancelar" [text]="true" severity="secondary" (onClick)="voltar()" />
      <p-button label="Criar Orçamento" icon="pi pi-check" type="submit" [loading]="salvando" />
    </div>

  </form>
</div>
