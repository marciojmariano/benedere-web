<div>
  <p-toast />
  <p-confirmDialog />

  <app-page-header title="Ingredientes" subtitle="Gerencie os ingredientes cadastrados">
    <p-button label="Novo Ingrediente" icon="pi pi-plus" (onClick)="novo()" />
  </app-page-header>

  <!-- Chips de unidade + busca -->
  <div class="mb-4 flex flex-wrap items-center gap-3">
    <div class="flex flex-wrap gap-2">
      @for (u of unidades; track u) {
        <button [class]="'px-3 py-1.5 rounded-full text-xs font-semibold border transition-colors uppercase ' + chipClass(u)"
                (click)="toggleUnidade(u)">
          {{ u }}
        </button>
      }
    </div>
    <div class="relative ml-auto">
      <i class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400 text-sm"></i>
      <input pInputText type="text" placeholder="Buscar ingrediente..."
             class="w-64 pl-9"
             [value]="busca()"
             (input)="busca.set($any($event.target).value)" />
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-zinc-100">
    <p-table [value]="ingredientes()" [loading]="loading" [paginator]="true" [rows]="10"
             styleClass="p-datatable-sm">
      <ng-template pTemplate="caption">
        <div class="flex justify-between items-center">
          <span class="text-sm text-zinc-400">{{ ingredientes().length }} ingrediente(s)</span>
        </div>
      </ng-template>
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="nome">Nome <p-sortIcon field="nome" /></th>
          <th>Unidade</th>
          <th pSortableColumn="custo_unitario">Custo Unitário <p-sortIcon field="custo_unitario" /></th>
          <th>Status</th>
          <th style="width: 120px">Ações</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-i>
        <tr class="group cursor-pointer hover:bg-zinc-50/50 transition-colors" (click)="abrirDetalhe(i)">
          <td class="font-medium text-zinc-800">{{ i.nome }}</td>
          <td>
            <span class="px-2 py-0.5 rounded-full text-xs font-medium bg-zinc-100 text-zinc-600 uppercase">
              {{ i.unidade_medida }}
            </span>
          </td>
          <td class="font-medium text-emerald-600">{{ i.custo_unitario | currencyBrl }}</td>
          <td><app-status-badge [status]="i.ativo ? 'ativo' : 'inativo'" /></td>
          <td>
            <div class="flex gap-1" (click)="$event.stopPropagation()">
              <button class="p-1.5 rounded-lg text-zinc-400 hover:text-emerald-600 hover:bg-emerald-50 transition-colors"
                      (click)="editar(i)" title="Editar">
                <i class="pi pi-pencil"></i>
              </button>
              <button class="p-1.5 rounded-lg text-zinc-400 hover:text-rose-600 hover:bg-rose-50 transition-colors"
                      (click)="confirmarDesativar(i)" title="Desativar">
                <i class="pi pi-trash"></i>
              </button>
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center py-12">
            <i class="pi pi-box text-4xl text-zinc-300 mb-3"></i>
            <p class="text-zinc-400 font-medium">Nenhum ingrediente encontrado</p>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  <!-- Drawer de detalhes -->
  <app-ingrediente-detail-drawer
    [visible]="drawerVisible()"
    [ingrediente]="ingredienteSelecionado()"
    (visibleChange)="drawerVisible.set($event)"
    (editar)="editar($event); drawerVisible.set(false)"
  />
</div>
