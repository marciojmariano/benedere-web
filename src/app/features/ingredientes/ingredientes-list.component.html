<div>
  <p-toast />
  <p-confirmDialog />

  <div class="flex items-center justify-between mb-6">
    <div>
      <h2 class="text-2xl font-bold text-gray-800">Ingredientes</h2>
      <p class="text-gray-500 text-sm mt-1">Gerencie os ingredientes cadastrados</p>
    </div>
    <p-button label="Novo Ingrediente" icon="pi pi-plus" (onClick)="novo()" />
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100">
    <p-table [value]="ingredientes" [loading]="loading" [paginator]="true" [rows]="10" styleClass="p-datatable-sm">
      <ng-template pTemplate="header">
        <tr>
          <th>Nome</th>
          <th>Unidade</th>
          <th>Custo Unitário</th>
          <th>Status</th>
          <th style="width: 120px">Ações</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-i>
        <tr>
          <td class="font-medium">{{ i.nome }}</td>
          <td>{{ i.unidade_medida }}</td>
          <td>R$ {{ i.custo_unitario }}</td>
          <td><p-tag [value]="i.ativo ? 'Ativo' : 'Inativo'" [severity]="i.ativo ? 'success' : 'danger'" /></td>
          <td>
            <div class="flex gap-2">
              <p-button icon="pi pi-pencil" [text]="true" [rounded]="true" size="small" (onClick)="editar(i)" />
              <p-button icon="pi pi-trash" [text]="true" [rounded]="true" size="small" severity="danger" (onClick)="confirmarDesativar(i)" />
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="5" class="text-center text-gray-400 py-8">Nenhum ingrediente encontrado</td></tr>
      </ng-template>
    </p-table>
  </div>
</div>
