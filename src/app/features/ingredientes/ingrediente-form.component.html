<div class="max-w-2xl">
  <p-toast />
  <div class="flex items-center gap-3 mb-6">
    <p-button icon="pi pi-arrow-left" [text]="true" [rounded]="true" (onClick)="voltar()" />
    <div>
      <h2 class="text-2xl font-bold text-gray-800">{{ ingredienteId ? 'Editar Ingrediente' : 'Novo Ingrediente' }}</h2>
      <p class="text-gray-500 text-sm mt-1">Preencha os dados do ingrediente</p>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
    <form [formGroup]="form" (ngSubmit)="salvar()">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Nome <span class="text-red-500">*</span></label>
        <input pInputText formControlName="nome" placeholder="Nome do ingrediente" class="w-full" [class.ng-invalid]="isInvalid('nome')" />
        @if (isInvalid('nome')) { <small class="text-red-500">Nome é obrigatório</small> }
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Unidade de Medida <span class="text-red-500">*</span></label>
        <p-select formControlName="unidade_medida" [options]="unidades" optionLabel="label" optionValue="value" placeholder="Selecione" styleClass="w-full" />
        @if (isInvalid('unidade_medida')) { <small class="text-red-500">Unidade é obrigatória</small> }
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Custo Unitário (R$) <span class="text-red-500">*</span></label>
        <input pInputText formControlName="custo_unitario" type="number" step="0.0001" placeholder="0.0000" class="w-full" [class.ng-invalid]="isInvalid('custo_unitario')" />
        @if (isInvalid('custo_unitario')) { <small class="text-red-500">Custo é obrigatório</small> }
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Markup (opcional)</label>
        <p-select formControlName="markup_id" [options]="markups" optionLabel="nome" optionValue="id" placeholder="Sem markup" [showClear]="true" styleClass="w-full" />
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
        <input pInputText formControlName="descricao" placeholder="Descrição opcional" class="w-full" />
      </div>
      <div class="flex gap-3 justify-end">
        <p-button label="Cancelar" [text]="true" severity="secondary" (onClick)="voltar()" />
        <p-button label="Salvar" icon="pi pi-check" type="submit" [loading]="salvando" />
      </div>
    </form>
  </div>
</div>
